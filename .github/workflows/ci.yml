name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck (frontend)
        run: npm run typecheck

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Vite build
        run: npm run build
